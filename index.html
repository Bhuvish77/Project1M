<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎂 Ansley's Birthday Surprise</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #ffe4ec;    /* light pink */
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* ----- floating hearts canvas (background animation) ----- */
    #heart-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;   /* allow clicking through */
      z-index: 1;
    }

    /* ----- main container (on top of hearts) ----- */
    #main-container {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 820px;
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem 1.5rem;
      background: rgba(255, 228, 236, 0.45);
      backdrop-filter: blur(2px);
      border-radius: 60px 20px 60px 20px;
      box-shadow: 0 20px 40px rgba(255, 105, 135, 0.2);
      transition: all 0.3s ease;
    }

    /* shared text style */
    .fade-text {
      animation: fadePop 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.1) forwards;
      opacity: 0;
      transform: scale(0.92);
    }

    @keyframes fadePop {
      0% { opacity: 0; transform: scale(0.92) translateY(12px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* big titles */
    .giant-title {
      font-size: 4.8rem;
      font-weight: 800;
      color: #b3415c;
      text-shadow: 0 6px 18px rgba(255, 80, 120, 0.3);
      letter-spacing: 2px;
      line-height: 1.2;
      margin: 0.2rem 0;
    }

    .medium-title {
      font-size: 2.8rem;
      font-weight: 600;
      color: #a13a52;
      margin: 0.5rem 0;
      letter-spacing: 1px;
    }

    .sub-message {
      font-size: 1.9rem;
      color: #7f2e44;
      font-weight: 500;
      margin: 0.8rem 0;
    }

    /* option buttons */
    .option-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem;
      margin: 2rem 0 1.5rem;
    }

    .option-btn {
      background: #ffb6c9;
      border: none;
      padding: 1rem 2rem;
      font-size: 1.3rem;
      font-weight: 600;
      color: #4d1e2b;
      border-radius: 60px;
      box-shadow: 0 6px 0 #b36b7e, 0 10px 20px rgba(190, 70, 100, 0.2);
      cursor: pointer;
      transition: all 0.08s linear;
      letter-spacing: 0.3px;
      min-width: 180px;
      background: #ffc1d4;
      border: 1px solid #ffa5bc;
    }

    .option-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #b36b7e;
    }

    .option-btn:hover {
      background: #ffb0c7;
      transform: scale(1.01);
    }

    /* countdown style */
    .countdown-number {
      font-size: 5.5rem;
      font-weight: 800;
      color: #b3415c;
      background: rgba(255, 220, 230, 0.6);
      padding: 0.2rem 1.8rem;
      border-radius: 100px;
      display: inline-block;
      margin: 0.6rem 0;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 20px rgba(200, 70, 110, 0.2);
    }

    .surprise-video {
      margin: 1.2rem 0;
      width: 100%;
      max-width: 560px;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(180, 50, 80, 0.3);
      border: 3px solid #ffb0c7;
    }

    .surprise-video iframe {
      width: 100%;
      height: 315px;
      border: none;
      display: block;
    }

    .final-look {
      font-size: 4.2rem;
      font-weight: 800;
      color: #9f2f4b;
      letter-spacing: 6px;
      text-shadow: 0 4px 14px #ff9bb3;
      margin: 1.2rem 0 0.2rem;
    }

    .hidden {
      display: none !important;
    }

    .btn-disabled {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(0.3);
    }

    /* small screens */
    @media (max-width: 600px) {
      .giant-title { font-size: 3.2rem; }
      .medium-title { font-size: 2rem; }
      .sub-message { font-size: 1.4rem; }
      .option-btn { font-size: 1rem; padding: 0.8rem 1.2rem; min-width: 140px; }
      .countdown-number { font-size: 3.8rem; padding: 0.1rem 1.2rem; }
      .final-look { font-size: 2.8rem; }
      .surprise-video iframe { height: 200px; }
    }
  </style>
</head>
<body>

  <!-- heart animation canvas -->
  <canvas id="heart-canvas"></canvas>

  <!-- main content -->
  <div id="main-container">
    <!-- step 1: HAPPY 19 ERUMA -->
    <div id="step1" class="fade-text">
      <div class="giant-title">HAPPY 19</div>
      <div class="giant-title" style="margin-top: -0.4rem;">ERUMA ✨</div>
    </div>

    <!-- step 2: READY FOR THE SURPRISE -->
    <div id="step2" class="hidden fade-text">
      <div class="medium-title">🎁 READY FOR THE</div>
      <div class="medium-title" style="color: #b3415c;">SURPRISE ?</div>
    </div>

    <!-- step 3: ANY GUESSES!!!! + options -->
    <div id="step3" class="hidden fade-text">
      <div class="sub-message" style="font-size: 2.2rem; font-weight: 700;">ANY GUESSES!!!!</div>
      <div class="option-grid">
        <button class="option-btn" data-opt="1">✨ Good Birthday Message</button>
        <button class="option-btn" data-opt="2">💞 Memory Timeline</button>
        <button class="option-btn" data-opt="3">📸 Photo Slideshow</button>
      </div>
      <div id="wrong-message" class="hidden" style="font-size: 1.5rem; color: #a13a52; font-weight: 600; margin: 0.6rem 0;">
        Ahh Haa!!! None of the Options are Correct
      </div>
    </div>

    <!-- step 4: countdown -->
    <div id="step4" class="hidden fade-text">
      <div class="sub-message" style="font-size: 1.8rem;">⏳ get ready ...</div>
      <div id="countdownDisplay" class="countdown-number">10</div>
    </div>

    <!-- step 5: SURPRISE!!!! + video -->
    <div id="step5" class="hidden fade-text">
      <div class="giant-title" style="font-size: 4.2rem;">🎉 SURPRISE!!!!</div>
      <div class="surprise-video">
        <!-- YouTube unlisted video (replace with your link) -->
        <iframe src="https://www.youtube.com/embed/6tWw3v2GfXo?autoplay=1&mute=1" 
                title="Birthday surprise video" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
        </iframe>
      </div>
      <div style="font-size: 1.2rem; color: #6e2b3d; margin-top: 0.4rem;">💖 only for you, Ansley 💖</div>
    </div>

    <!-- final: Look at Me -->
    <div id="step6" class="hidden fade-text">
      <div class="final-look">✨ Look at Me ✨</div>
      <div style="font-size: 1.8rem; color: #7f2e44; margin-top: 0.5rem;">💗 with love 💗</div>
    </div>
  </div>

  <script>
    (function() {
      // ---------- floating hearts canvas ----------
      const canvas = document.getElementById('heart-canvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let hearts = [];

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      class Heart {
        constructor() {
          this.reset();
        }
        reset() {
          this.x = Math.random() * width;
          this.y = Math.random() * height - height * 0.2;
          this.size = Math.random() * 20 + 10;   // 10–30px
          this.speedY = Math.random() * 1.2 + 0.6;
          this.speedX = (Math.random() - 0.5) * 0.6;
          this.opacity = Math.random() * 0.5 + 0.4; // 0.4–0.9
          this.rotation = Math.random() * 360;
          this.rotationSpeed = (Math.random() - 0.5) * 0.02;
          this.color = `hsla(${340 + Math.random() * 20}, 80%, 70%, ${this.opacity})`;
        }
        update() {
          this.y += this.speedY;
          this.x += this.speedX + Math.sin(this.y * 0.01) * 0.15;
          this.rotation += this.rotationSpeed;
          if (this.y > height + 40) {
            this.reset();
            this.y = -40;
          }
          if (this.x < -30) this.x = width + 20;
          if (this.x > width + 30) this.x = -20;
        }
        draw() {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.rotation);
          ctx.scale(this.size / 20, this.size / 20);
          ctx.globalAlpha = this.opacity;
          ctx.fillStyle = this.color;
          ctx.shadowColor = 'rgba(255, 120, 160, 0.4)';
          ctx.shadowBlur = 12;
          // draw heart path
          ctx.beginPath();
          ctx.moveTo(0, -4);
          ctx.bezierCurveTo(-8, -12, -20, -4, 0, 8);
          ctx.bezierCurveTo(20, -4, 8, -12, 0, -4);
          ctx.fill();
          ctx.restore();
        }
      }

      // init hearts
      for (let i = 0; i < 45; i++) {
        const h = new Heart();
        h.y = Math.random() * height;
        h.size = Math.random() * 22 + 8;
        hearts.push(h);
      }

      function animateHearts() {
        ctx.clearRect(0, 0, width, height);
        for (let h of hearts) {
          h.update();
          h.draw();
        }
        requestAnimationFrame(animateHearts);
      }
      animateHearts();

      // ---------- main flow control ----------
      const step1 = document.getElementById('step1');
      const step2 = document.getElementById('step2');
      const step3 = document.getElementById('step3');
      const step4 = document.getElementById('step4');
      const step5 = document.getElementById('step5');
      const step6 = document.getElementById('step6');
      const wrongMsg = document.getElementById('wrong-message');
      const countdownDisplay = document.getElementById('countdownDisplay');
      const optionBtns = document.querySelectorAll('.option-btn');

      let countdownInterval = null;
      let flowActive = true;    // prevent double triggers

      // ---- hide all, show step1 ----
      function showStep(stepEl) {
        [step1, step2, step3, step4, step5, step6].forEach(el => el.classList.add('hidden'));
        if (stepEl) {
          stepEl.classList.remove('hidden');
          // re-trigger fade animation
          stepEl.style.animation = 'none';
          stepEl.offsetHeight; // reflow
          stepEl.style.animation = 'fadePop 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.1) forwards';
        }
      }

      // ---- start sequence after step1 ----
      function startSequence() {
        if (!flowActive) return;
        // after "HAPPY 19 ERUMA" -> step2
        setTimeout(() => {
          if (!flowActive) return;
          showStep(step2);
          // step2 -> step3
          setTimeout(() => {
            if (!flowActive) return;
            showStep(step3);
            // enable options after step3 appears
            optionBtns.forEach(btn => btn.disabled = false);
          }, 1600);
        }, 1800);
      }

      // ---- handle option click ----
      function handleOptionClick(e) {
        if (!flowActive) return;
        const btn = e.currentTarget;
        if (btn.disabled) return;
        // disable buttons to prevent multiple clicks
        optionBtns.forEach(b => b.disabled = true);
        // show wrong message
        wrongMsg.classList.remove('hidden');
        // after 0.8s go to countdown
        setTimeout(() => {
          if (!flowActive) return;
          // hide wrong message (optional) but keep visible, move to step4
          showStep(step4);
          startCountdown();
        }, 900);
      }

      // ---- countdown from 10 to 0 ----
      function startCountdown() {
        let count = 10;
        countdownDisplay.textContent = count;
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
          count -= 1;
          countdownDisplay.textContent = count;
          if (count <= 0) {
            clearInterval(countdownInterval);
            countdownInterval = null;
            // go to step5 (surprise + video)
            setTimeout(() => {
              if (!flowActive) return;
              showStep(step5);
              // after 3.5s -> step6 "Look at Me"
              setTimeout(() => {
                if (!flowActive) return;
                showStep(step6);
                // end of execution (flowActive = false to block any further changes)
                flowActive = false;
              }, 3500);
            }, 300);
          }
        }, 1000);
      }

      // ---- attach option listeners ----
      optionBtns.forEach(btn => {
        btn.addEventListener('click', handleOptionClick);
      });

      // ---- start the whole experience ----
      // initially show step1, after that run sequence
      showStep(step1);
      // sequence begins after step1 is displayed
      setTimeout(() => {
        startSequence();
      }, 400);

      // ---- in case of any unexpected error, keep flow ----
      // Also if user clicks fast, we disable buttons later.
      // reset flowActive if needed (not used)
      window.addEventListener('load', () => {
        // ensure video autoplay (iframe has autoplay=1)
      });

    })();
  </script>
</body>
</html>
